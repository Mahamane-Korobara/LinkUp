# À insérer dans le vhost HTTPS linkup.sahelstack.tech (linkup-le-ssl.conf), AVANT
# le « ProxyPass / » catch-all → tunnel :18000 (Apache = première règle gagnante).
#
# Le service videohub écoute en local sur 127.0.0.1:8780 ; Apache termine le TLS.
# timeout=300 : téléchargements potentiellement longs (ProxyTimeout n'est PAS
# autorisé dans <Location>, on le met en paramètre de ProxyPass).

ProxyPass        /video/ http://127.0.0.1:8780/video/ timeout=300
ProxyPassReverse /video/ http://127.0.0.1:8780/video/
