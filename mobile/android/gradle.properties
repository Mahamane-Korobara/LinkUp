# -Xmx ramené sous la RAM physique (7,4 Go) : 8 Go demandaient plus que toute la
# mémoire de la machine → le démon Gradle se faisait tuer (OOM). 3 Go suffisent
# largement pour un build Flutter debug et laissent de l'air à l'OS + démon Kotlin.
org.gradle.jvmargs=-Xmx3G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Certains plugins (ex. receive_sharing_intent) compilent leur Kotlin sur une
# cible JVM plus récente que leur Java, ce qui fait échouer la validation Gradle.
# L'app, elle, est en Java/Kotlin 17 (app/build.gradle.kts). Le dexing (D8) gère
# l'écart sans souci → on rétrograde l'erreur en avertissement.
kotlin.jvm.target.validation.mode=warning
